<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>EA QR Gen - Cloud Edition</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800&family=Caveat:wght@700&display=swap">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --ea-blue: #003399;
            --ea-red: #E3001B;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --sidebar-width: 320px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background: #fff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 40px 20px 20px;
            background: var(--ea-blue);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .action-btn.danger {
            background: rgba(227, 0, 27, 0.2);
            border-color: rgba(227, 0, 27, 0.4);
        }
        
        .action-btn:active {
            transform: scale(0.95);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .history-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:active {
            background: #e2e8f0;
            transform: scale(0.98);
        }

        .delete-btn {
            background: #ffeaea;
            color: #ff4d4d;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.4rem;
            opacity: 0.9;
            transition: all 0.2s;
        }

        .delete-btn:active {
            background: #ff4d4d;
            color: white;
            transform: scale(0.9);
        }

        .history-content {
            flex: 1;
        }

        .history-item .h-name {
            display: block;
            font-weight: 700;
            color: var(--ea-blue);
            font-size: 0.95rem;
        }

        .history-item .h-status {
            font-size: 0.75rem;
            color: #94a3b8;
        }

        /* --- MAIN --- */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-mark {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--ea-blue) 45%, #fff 45%, #fff 55%, var(--ea-red) 55%);
            border-radius: 12px;
            margin: 0 auto 15px;
            box-shadow: 0 10px 20px rgba(0,51,153,0.1);
        }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            color: var(--ea-blue);
        }

        .form-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 18px 24px;
            font-size: 1.4rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            outline: none;
        }

        #generateBtn {
            width: 100%;
            padding: 20px;
            background: var(--ea-blue);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
        }

        /* --- OVERLAY --- */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: white;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 40px;
        }

        .display-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 4rem;
            color: var(--ea-blue);
            text-align: center;
            margin: 0;
        }

        .qr-box {
            background: white;
            padding: 25px;
            border: 6px solid var(--ea-blue);
            border-radius: 30px;
            margin: 40px 0;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
        }

        #nextBtn {
            background: var(--ea-red);
            color: white;
            border: none;
            padding: 20px 60px;
            border-radius: 16px;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
        }

        @media (max-width: 800px) {
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Historique</h2>
            <div class="header-actions">
                <a href="/api/export" class="action-btn">CSV</a>
                <button onclick="newSession()" class="action-btn danger">Session</button>
            </div>
        </div>
        <div id="historyList" class="history-list"></div>
    </aside>

    <main class="main">
        <div class="brand-header">
            <div class="logo-mark"></div>
            <div class="logo-text">europ assistance</div>
        </div>

        <div class="form-card">
            <div class="input-group">
                <input type="text" id="firstNameInput" placeholder="Prénom" autocomplete="off">
                <input type="text" id="lastNameInput" placeholder="NOM" autocomplete="off">
                <input type="date" id="dateInput">
            </div>
            <button id="generateBtn">Générer le QR Code</button>
        </div>
    </main>

    <div id="qrOverlay" class="overlay">
        <div class="logo-text" style="font-size: 1.2rem; margin-bottom: 20px;">europ assistance</div>
        <h2 id="nameDisplay" class="display-name"></h2>
        <p id="dateDisplay" style="font-size: 1.5rem; color: #64748b; margin-top: 10px;"></p>
        <div class="qr-box"><div id="qrcode"></div></div>
        <button id="nextBtn" onclick="closeQR()">Suivant</button>
    </div>

    <script>
        const firstNameInput = document.getElementById('firstNameInput');
        const lastNameInput = document.getElementById('lastNameInput');
        const dateInput = document.getElementById('dateInput');
        const historyList = document.getElementById('historyList');
        const qrOverlay = document.getElementById('qrOverlay');

        window.addEventListener('load', () => {
            dateInput.value = new Date().toISOString().split('T')[0];
            fetchHistory();
        });

        document.getElementById('generateBtn').addEventListener('click', generateQR);

        async function fetchHistory() {
            try {
                const res = await fetch('/api/history');
                const data = await res.json();
                renderHistory(data);
            } catch (e) { console.error(e); }
        }

        function renderHistory(history) {
            if (history.length === 0) {
                historyList.innerHTML = '<p style="text-align:center;color:#999;margin-top:20px;">Aucun scan</p>';
                return;
            }
            historyList.innerHTML = history.map(item => `
                <div class="history-item" onclick="loadItem('${item.first_name}', '${item.last_name}')">
                    <div class="history-content">
                        <span class="h-name">${item.first_name} ${item.last_name}</span>
                        <span class="h-status">${item.date_display}</span>
                    </div>
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteItem('${item.id}')">&times;</button>
                </div>
            `).join('');
        }

        window.deleteItem = async (id) => {
            if (!confirm("Supprimer ce collaborateur ?")) return;
            try {
                const res = await fetch(`/api/history/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    fetchHistory();
                } else {
                    const err = await res.text();
                    console.error("Delete failed:", err);
                    alert("Erreur lors de la suppression : " + err);
                }
            } catch (e) { 
                console.error(e);
                alert("Erreur réseau");
            }
        }

        window.newSession = async () => {
            if (!confirm("Voulez-vous démarrer une nouvelle session ? Cela effacera TOUT l'historique sur le serveur.")) return;
            try {
                const res = await fetch('/api/history', { method: 'DELETE' });
                if (res.ok) {
                    fetchHistory();
                } else {
                    alert("Erreur lors de la réinitialisation");
                }
            } catch (e) {
                console.error(e);
                alert("Erreur réseau");
            }
        }

        async function generateQR(shouldSave = true) {
            let first = firstNameInput.value.trim();
            let last = lastNameInput.value.trim();
            if (!first || !last) return alert("Champs vides");

            first = first.charAt(0).toUpperCase() + first.slice(1).toLowerCase();
            last = last.toUpperCase();

            const dateVal = new Date(dateInput.value);
            const dateFile = dateVal.toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit', year:'numeric'}).replace(/\//g,'');
            const dateDisplay = dateVal.toLocaleDateString('fr-FR', {day:'numeric', month:'long', year:'numeric'});
            const qrData = `${first} ${last}_${dateFile}`;

            document.getElementById('nameDisplay').textContent = `${first} ${last}`;
            document.getElementById('dateDisplay').textContent = dateDisplay;

            const qrcodeDiv = document.getElementById('qrcode');
            qrcodeDiv.innerHTML = "";
            new QRCode(qrcodeDiv, { text: qrData, width: 400, height: 400, colorDark: "#003399" });

            // Save to DB only if it's a new generation
            if (shouldSave) {
                try {
                    await fetch('/api/scan', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ first, last, dateDisplayText: dateDisplay, qrData })
                    });
                    fetchHistory();
                } catch (e) { console.error(e); }
            }

            qrOverlay.style.display = 'flex';
        }

        function closeQR() {
            qrOverlay.style.display = 'none';
            firstNameInput.value = ""; lastNameInput.value = "";
            firstNameInput.focus();
        }

        window.loadItem = (f, l) => {
            firstNameInput.value = f; lastNameInput.value = l;
            generateQR(false); // Do not save duplicate to DB
        }
    </script>
</body>
</html>
