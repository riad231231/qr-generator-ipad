<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>EA QR Gen - iPad Edition</title>
    
    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800&family=Caveat:wght@700&display=swap">
    
    <!-- QRCode Library (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --ea-blue: #003399;
            --ea-red: #E3001B;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --sidebar-width: 300px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR HISTORIQUE --- */
        .sidebar {
            width: var(--sidebar-width);
            background: #fff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 40px 20px 20px;
            background: var(--ea-blue);
            color: white;
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .search-box {
            width: 100%;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 0.9rem;
            outline: none;
        }

        .search-box::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .action-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .history-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:active {
            background: #e2e8f0;
            transform: scale(0.98);
        }

        .delete-btn {
            background: #ffeaea;
            color: #ff4d4d;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.4rem;
            opacity: 0.9;
        }

        .delete-btn:active {
            background: #ff4d4d;
            color: white;
            transform: scale(0.9);
        }

        .h-content {
            flex: 1;
        }

        .history-item .h-name {
            display: block;
            font-weight: 700;
            color: var(--ea-blue);
            font-size: 0.95rem;
        }

        .history-item .h-date {
            font-size: 0.8rem;
            color: #64748b;
        }

        .empty-history {
            text-align: center;
            color: #94a3b8;
            margin-top: 40px;
            font-size: 0.9rem;
        }

        /* --- MAIN CONTENT --- */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-mark {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--ea-blue) 45%, #fff 45%, #fff 55%, var(--ea-red) 55%);
            border-radius: 12px;
            margin: 0 auto 15px;
            box-shadow: 0 10px 20px rgba(0,51,153,0.1);
        }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            color: var(--ea-blue);
            line-height: 0.9;
        }

        .slogan {
            font-family: 'Caveat', cursive;
            font-size: 1.2rem;
            color: var(--ea-blue);
        }

        .slogan span { color: var(--ea-red); }

        .form-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .field label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        input {
            width: 100%;
            padding: 18px 24px;
            font-size: 1.4rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--ea-blue);
            box-shadow: 0 0 0 5px rgba(0,51,153,0.05);
        }

        #generateBtn {
            width: 100%;
            padding: 20px;
            background: var(--ea-blue);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.5rem;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(0,51,153,0.2);
            cursor: pointer;
        }

        #generateBtn:active { transform: scale(0.98); }

        /* --- QR OVERLAY (Full Screen) --- */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: white;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 40px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(1.05); }
            to { opacity: 1; transform: scale(1); }
        }

        .display-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 4rem;
            color: var(--ea-blue);
            margin: 0;
            text-align: center;
            line-height: 1;
        }

        .display-date {
            font-size: 1.5rem;
            color: #64748b;
            margin: 10px 0 40px;
        }

        .qr-box {
            background: white;
            padding: 25px;
            border: 6px solid var(--ea-blue);
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }

        #nextBtn {
            background: var(--ea-red);
            color: white;
            border: none;
            padding: 20px 60px;
            border-radius: 16px;
            font-size: 1.4rem;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(227,0,27,0.2);
        }

        /* --- MOBILE ADJUSTMENTS --- */
        @media (max-width: 800px) {
            .sidebar { display: none; }
            .display-name { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <!-- Sidebar Historique -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="header-top">
                <h2>Historique</h2>
                <button onclick="newSession()" class="action-btn">Vider</button>
            </div>
            <input type="text" id="historySearch" class="search-box" placeholder="Chercher un nom..." oninput="renderHistory()">
        </div>
        <div id="historyList" class="history-list">
            <!-- Rempli par JS -->
        </div>
    </aside>

    <!-- Main -->
    <main class="main">
        <div class="brand-header">
            <div class="logo-mark"></div>
            <div class="logo-text">europ assistance</div>
            <div class="slogan">you live <span>we care</span></div>
        </div>

        <div class="form-card">
            <div class="input-group">
                <div class="field">
                    <label>Prénom</label>
                    <input type="text" id="firstNameInput" placeholder="ex: Jean" autocomplete="off">
                </div>
                <div class="field">
                    <label>NOM</label>
                    <input type="text" id="lastNameInput" placeholder="ex: DUPONT" autocomplete="off">
                </div>
                <div class="field">
                    <label>Date du shooting</label>
                    <input type="date" id="dateInput">
                </div>
            </div>
            <button id="generateBtn">Générer le QR Code</button>
        </div>
    </main>

    <!-- Overlay QR -->
    <div id="qrOverlay" class="overlay">
        <div class="logo-text" style="font-size: 1.2rem; margin-bottom: 20px;">europ assistance</div>
        
        <h2 id="nameDisplay" class="display-name">JEAN DUPONT</h2>
        <p id="dateDisplay" class="display-date">12 avril 2026</p>

        <div class="qr-box">
            <div id="qrcode"></div>
        </div>

        <p id="qrDataText" style="color: #cbd5e1; font-size: 0.8rem; margin-bottom: 40px;"></p>

        <button id="nextBtn" onclick="closeQR()">Collaborateur Suivant</button>
    </div>

    <script>
        const firstNameInput = document.getElementById('firstNameInput');
        const lastNameInput = document.getElementById('lastNameInput');
        const dateInput = document.getElementById('dateInput');
        const historyList = document.getElementById('historyList');
        const qrOverlay = document.getElementById('qrOverlay');

        let history = JSON.parse(localStorage.getItem('ea_history') || '[]');

        // Initialiser la date du jour
        window.addEventListener('load', () => {
            const today = new Date();
            dateInput.value = today.toISOString().split('T')[0];
            renderHistory();
        });

        document.getElementById('generateBtn').addEventListener('click', generateQR);

        function generateQR(shouldSave = true) {
            let first = firstNameInput.value.trim();
            let last = lastNameInput.value.trim();
            let dateVal = dateInput.value;

            if (!first || !last) {
                alert("Veuillez remplir les deux champs.");
                return;
            }

            // Mise en forme
            first = first.charAt(0).toUpperCase() + first.slice(1).toLowerCase();
            last = last.toUpperCase();

            // Date processing
            const targetDate = new Date(dateVal);
            const dd = String(targetDate.getDate()).padStart(2, '0');
            const mm = String(targetDate.getMonth() + 1).padStart(2, '0');
            const yyyy = targetDate.getFullYear();
            const dateFile = `${dd}${mm}${yyyy}`;
            
            const displayOptions = { day: 'numeric', month: 'long', year: 'numeric' };
            const dateDisplayText = targetDate.toLocaleDateString('fr-FR', displayOptions);

            const qrData = `${first} ${last}_${dateFile}`;

            // Affichage
            document.getElementById('nameDisplay').textContent = `${first} ${last}`;
            document.getElementById('dateDisplay').textContent = dateDisplayText;
            document.getElementById('qrDataText').textContent = qrData;

            // QR Code Generation
            const qrcodeDiv = document.getElementById('qrcode');
            qrcodeDiv.innerHTML = "";
            
            // Calculer taille QR (iPad responsive)
            const qrSize = Math.min(window.innerWidth * 0.6, 500);

            new QRCode(qrcodeDiv, {
                text: qrData,
                width: qrSize,
                height: qrSize,
                colorDark: "#003399",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.M
            });

            // Enregistrer dans l'historique seulement s'il s'agit d'une nouvelle génération
            if (shouldSave) {
                const scan = { first, last, dateDisplayText, id: Date.now() };
                history.unshift(scan);
                // Augmenter la limite pour supporter 2000+ personnes
                if(history.length > 2000) history.pop(); 
                localStorage.setItem('ea_history', JSON.stringify(history));
                renderHistory();
            }

            // Show overlay
            qrOverlay.style.display = 'flex';
        }

        function closeQR() {
            qrOverlay.style.display = 'none';
            firstNameInput.value = "";
            lastNameInput.value = "";
            firstNameInput.focus();
        }

        function renderHistory() {
            const query = document.getElementById('historySearch').value.toLowerCase();
            const filtered = history.filter(item => 
                `${item.first} ${item.last}`.toLowerCase().includes(query)
            );

            if (filtered.length === 0) {
                historyList.innerHTML = '<p class="empty-history">' + (query ? 'Aucun résultat' : 'Aucun scan récent') + '</p>';
                return;
            }

            historyList.innerHTML = filtered.map(item => `
                <div class="history-item" onclick="loadHistoryItem('${item.first}', '${item.last}')">
                    <div class="h-content">
                        <span class="h-name">${item.first} ${item.last}</span>
                        <span class="h-date">${item.dateDisplayText}</span>
                    </div>
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteHistoryItem('${item.id}')">&times;</button>
                </div>
            `).join('');
        }

        window.deleteHistoryItem = (id) => {
            if (!confirm("Supprimer ce collaborateur ?")) return;
            // Utiliser String() pour être sûr que la comparaison fonctionne quel que soit le type (numérique vs texte)
            history = history.filter(item => String(item.id) !== String(id));
            localStorage.setItem('ea_history', JSON.stringify(history));
            renderHistory();
        };

        window.newSession = () => {
            if (!confirm("Voulez-vous vider tout l'historique sur cet iPad ?")) return;
            history = [];
            localStorage.setItem('ea_history', JSON.stringify(history));
            renderHistory();
        }

        window.loadHistoryItem = (first, last) => {
            firstNameInput.value = first;
            lastNameInput.value = last;
            generateQR(false); // Ne pas sauvegarder en double
        };

        // Entrée clavier
        window.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (qrOverlay.style.display === 'flex') {
                    closeQR();
                } else {
                    generateQR();
                }
            }
        });
    </script>
</body>
</html>
